name: Dev.to CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main
    paths:
      - 'posts/**/**.md'
      - 'posts/**/**/**.md'
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - 'posts/**/**.md'
      - 'posts/**/**/**.md'

jobs:
  format_check:
    if: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')) || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 20

      - name: Install Dependencies
        uses: bahmutov/npm-install@v1.12.1

      - name: Check formatting
        shell: pwsh
        run: |
          $base = "${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD^' }}"
          $files = @(git diff --name-only --diff-filter=ACMR "$base...HEAD" -- '*.md' '*.json' '*.js' '*.ts' '*.html' '*.scss')
          if ($files.Count -gt 0) { yarn prettier --check $files }

      - name: Check embedded code
        shell: pwsh
        run: |
          $base = "${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD^' }}"
          $files = @(git diff --name-only --diff-filter=ACMR "$base...HEAD" -- 'posts/**/*.md')
          if ($files.Count -gt 0) { npx embedme $files --verify }

      - name: Audit changed posts
        shell: pwsh
        run: ./scripts/audit_posts.ps1 -ChangedOnly -BaseRef "${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD^' }}" -FailOnIssues

      - name: Dry Run Publish to Dev.to
        if: ${{ github.ref == 'refs/heads/dev' }}
        uses: sinedied/publish-devto@v2
        with:
          files: 'posts/**/*.md'
          devto_key: ${{ secrets.DEVTO_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
        continue-on-error: false

  publish_devto:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 20

      - name: Install Dependencies
        uses: bahmutov/npm-install@v1.12.1

      - name: Publish articles on dev.to
        uses: sinedied/publish-devto@v2
        with:
          files: 'posts/**/*.md'
          devto_key: ${{ secrets.DEVTO_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false
